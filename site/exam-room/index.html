<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Room — AFIT CBT Simulator</title>
    <link rel="icon" type="image/svg+xml" href="../static/img/afitcbtsim-logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/main.css">
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }

        #loading-screen {
            position: fixed; inset: 0; background: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 16px;
        }
        #loading-screen h3 { margin: 0; font-size: 1.1rem; color: #93c5fd; }

        #exam-wrapper { display: none; }

        .exam-topbar {
            background: #0f172a; color: white;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 1.5rem; height: 60px;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; font-weight: 700; font-size: 0.9rem; }
        .topbar-right { display: flex; align-items: center; gap: 14px; }

        .timer-box {
            background: #16a34a; color: white; padding: 0.45rem 1.1rem;
            border-radius: 10px; font-weight: 800; font-size: 1.15rem;
            font-variant-numeric: tabular-nums; letter-spacing: 1px;
            transition: background 0.4s;
        }
        .timer-box.warn { background: #f97316; }
        .timer-box.danger { background: #dc2626; animation: pulse 1s infinite; }

        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.7 } }

        .strikes-box { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #fbbf24; font-weight: 700; }
        .strike-icon { font-size: 1rem; }

        .exam-layout { display: grid; grid-template-columns: 1fr 260px; gap: 1.5rem; max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }

        /* Question Panel */
        .question-panel { display: flex; flex-direction: column; gap: 1rem; }

        .question-card {
            background: white; border-radius: 20px; padding: 2rem;
            border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
        }
        .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
        .q-number { font-size: 0.78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .q-tags { display: flex; gap: 6px; align-items: center; }
        .q-subject-tag { font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.7rem; border-radius: 20px; background: #eff6ff; color: #2563eb; }
        .q-report-id { font-size: 0.68rem; font-weight: 700; color: #94a3b8; font-family: monospace; letter-spacing: 1px; }

        .q-text { font-size: 1.05rem; font-weight: 600; color: #0f172a; line-height: 1.75; margin-bottom: 1.5rem; }

        .options { display: flex; flex-direction: column; gap: 0.65rem; }
        .opt-btn {
            display: flex; align-items: center; gap: 12px; padding: 0.9rem 1.2rem;
            border: 1.5px solid #e2e8f0; border-radius: 12px; background: white;
            cursor: pointer; text-align: left; font-family: 'Poppins', sans-serif;
            font-size: 0.95rem; font-weight: 500; color: #1e293b;
            transition: all 0.15s; width: 100%;
        }
        .opt-btn:hover { border-color: #93c5fd; background: #eff6ff; }
        .opt-btn.selected { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 700; }
        .opt-letter {
            width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; flex-shrink: 0; color: #64748b;
            transition: all 0.15s;
        }
        .opt-btn.selected .opt-letter { background: #2563eb; color: white; }

        .q-nav-row { display: flex; justify-content: space-between; gap: 1rem; }
        .btn-nav {
            flex: 1; padding: 0.75rem; border: 1.5px solid #e2e8f0; border-radius: 10px;
            background: white; font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: 0.875rem; cursor: pointer; color: #374151; transition: all 0.2s;
        }
        .btn-nav:hover { background: #f1f5f9; }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Sidebar Panel */
        .side-panel { position: sticky; top: 75px; display: flex; flex-direction: column; gap: 1rem; }

        .side-card {
            background: white; border-radius: 16px; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04); padding: 1.2rem;
        }
        .side-card h4 { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.8rem; }

        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .q-dot {
            width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid #e2e8f0;
            background: white; font-weight: 700; font-size: 0.75rem; cursor: pointer;
            color: #64748b; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
        }
        .q-dot.answered { background: #2563eb; border-color: #2563eb; color: white; }
        .q-dot.current { border-color: #0f172a; color: #0f172a; box-shadow: 0 0 0 2px rgba(15,23,42,0.15); }
        .q-dot.answered.current { border-color: #1d4ed8; box-shadow: 0 0 0 2px rgba(37,99,235,0.3); }

        .progress-wrap { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: #2563eb; border-radius: 4px; transition: width 0.3s; }
        .progress-label { font-size: 0.8rem; font-weight: 600; color: #64748b; }

        .btn-submit-exam {
            width: 100%; padding: 1rem; background: #16a34a; color: white; border: none;
            border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 800;
            font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 16px rgba(22,163,74,0.3);
        }
        .btn-submit-exam:hover { background: #15803d; }
        .btn-submit-exam:disabled { opacity: 0.6; cursor: not-allowed; }

        @media (max-width: 800px) {
            .exam-layout { grid-template-columns: 1fr; }
            .side-panel { position: static; }
            .exam-topbar { padding: 0 1rem; }
            .q-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
    <svg class="animate-spin" style="width:44px;height:44px;color:#38bdf8" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <h3 id="loading-msg">Verifying credentials...</h3>
</div>

<!-- Exam UI -->
<div id="exam-wrapper">

    <div class="exam-topbar">
        <div class="topbar-left">
            <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="22" fill="#2563eb"/>
                <path d="M50 20 L22 75 H36 L43 60 H57 L64 75 H78 L50 20 Z" fill="#ffffff"/>
            </svg>
            <span>AFIT POST-UTME</span>
        </div>
        <div class="topbar-right">
            <div class="strikes-box">
                <span id="strike-icons">⚠️ <span id="strikes-count">0</span>/3 Strikes</span>
            </div>
            <div class="timer-box" id="timer-display">40:00</div>
        </div>
    </div>

    <div class="exam-layout">

        <div class="question-panel">
            <div class="question-card" id="question-card">
                <!-- Filled by JS -->
            </div>
            <div class="q-nav-row">
                <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" disabled>← Previous</button>
                <button class="btn-nav" id="btn-next" onclick="navigate(1)">Next →</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="side-card">
                <h4>Progress</h4>
                <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
                <div class="progress-label"><span id="answered-count">0</span> of <span id="total-count">50</span> answered</div>
            </div>
            <div class="side-card">
                <h4>Question Navigator</h4>
                <div class="q-grid" id="q-grid"></div>
            </div>
            <button class="btn-submit-exam" id="submit-exam-btn" onclick="confirmSubmit()">Submit Exam</button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../static/app.js"></script>

<script>
    // ============================================================
    //  STATE
    // ============================================================
    let questions     = [];
    let answers       = {};   // { questionIndex: 'A'|'B'|'C'|'D' }
    let currentIndex  = 0;
    let strikes       = 0;
    let timerInterval = null;
    let secondsLeft   = 40 * 60;
    let examSubmitted = false;
    let currentUserId = null;
    let currentProfile = null;

    const SUBJECTS = {
        english:    'English',
        math:       'Mathematics',
        physics:    'Physics',
        chemistry:  'Chemistry',
        gns:        'GNS',
        economics:  'Economics',
        literature: 'Literature',
        government: 'Government',
        commerce:   'Commerce',
    };

    // ============================================================
    //  BOOT
    // ============================================================
    document.addEventListener('DOMContentLoaded', bootExam);

    async function bootExam() {
        setLoadingMsg('Verifying credentials...');

        const { data: { session }, error: authError } = await supabaseClient.auth.getSession();
        if (!session || authError) return window.location.href = '../login/index.html';

        currentUserId = session.user.id;

        const { data: profile } = await supabaseClient
            .from('profiles').select('*').eq('id', session.user.id).single();

        if (!profile || !profile.full_name) return window.location.href = '../bio-data/index.html';

        currentProfile = profile;

        // Gate check (same as exams page)
        const { data: resultsData } = await supabaseClient
            .from('results').select('id').eq('student_id', session.user.id);
        const testsTaken = resultsData ? resultsData.length : 0;

        if (!profile.has_paid && testsTaken >= 1) {
            alert('You have used your free exam. Upgrade to Premium on the Exams page to continue.');
            return window.location.href = '../exams/index.html';
        }

        setLoadingMsg('Loading questions...');
        await loadQuestions(profile);

        if (questions.length === 0) {
            alert('No questions available at this time. Please try again later.');
            return window.location.href = '../exams/index.html';
        }

        // Show exam UI
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('exam-wrapper').style.display = 'block';

        renderQuestionNavigator();
        renderQuestion(0);
        startTimer();
        requestFullscreen();
        setupAntiMalpractice();
    }

    function setLoadingMsg(msg) {
        document.getElementById('loading-msg').innerText = msg;
    }

    // ============================================================
    //  LOAD QUESTIONS
    // ============================================================
    async function loadQuestions(profile) {
        // Determine relevant subjects from course
        const course = (profile.course_applied || '').toLowerCase();
        let subjectFilter = ['english', 'gns'];

        if (course.includes('eng') || course.includes('sci') || course.includes('it') || course.includes('comp')) {
            subjectFilter = subjectFilter.concat(['math', 'physics', 'chemistry']);
        } else if (course.includes('art') || course.includes('hum')) {
            subjectFilter = subjectFilter.concat(['literature', 'government', 'economics']);
        } else if (course.includes('ss') || course.includes('social') || course.includes('econ') || course.includes('bus')) {
            subjectFilter = subjectFilter.concat(['economics', 'government', 'commerce']);
        } else {
            // Default: load all subjects
            subjectFilter = Object.keys(SUBJECTS);
        }

        const { data, error } = await supabaseClient
            .from('questions')
            .select('*')
            .in('subject', subjectFilter);

        if (error || !data) {
            console.error('Questions load error:', error);
            return;
        }

        // Shuffle and take 50
        const shuffled = data.sort(() => Math.random() - 0.5);
        questions = shuffled.slice(0, 50);
    }

    // ============================================================
    //  RENDER QUESTION
    // ============================================================
    function renderQuestion(index) {
        currentIndex = index;
        const q = questions[index];
        const selected = answers[index];

        const opts = [
            { letter: 'A', text: q.option_a },
            { letter: 'B', text: q.option_b },
            { letter: 'C', text: q.option_c },
            { letter: 'D', text: q.option_d },
        ];

        document.getElementById('question-card').innerHTML = `
            <div class="q-meta">
                <span class="q-number">Question ${index + 1} of ${questions.length}</span>
                <div class="q-tags">
                    <span class="q-subject-tag">${SUBJECTS[q.subject] || q.subject}</span>
                    <span class="q-report-id">ID: ${q.report_id || '????'}</span>
                </div>
            </div>
            <div class="q-text">${q.question_text}</div>
            <div class="options">
                ${opts.map(o => `
                    <button class="opt-btn ${selected === o.letter ? 'selected' : ''}"
                        onclick="selectAnswer('${o.letter}')">
                        <span class="opt-letter">${o.letter}</span>
                        ${o.text}
                    </button>
                `).join('')}
            </div>
        `;

        // Nav buttons
        document.getElementById('btn-prev').disabled = index === 0;
        document.getElementById('btn-next').disabled = index === questions.length - 1;

        // Update grid highlight
        document.querySelectorAll('.q-dot').forEach((el, i) => {
            el.classList.toggle('current', i === index);
        });
    }

    function selectAnswer(letter) {
        answers[currentIndex] = letter;
        renderQuestion(currentIndex);
        updateProgress();
        updateGrid();
    }

    function navigate(dir) {
        const next = currentIndex + dir;
        if (next >= 0 && next < questions.length) renderQuestion(next);
    }

    // ============================================================
    //  QUESTION NAVIGATOR
    // ============================================================
    function renderQuestionNavigator() {
        const grid = document.getElementById('q-grid');
        document.getElementById('total-count').innerText = questions.length;
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'q-dot';
            btn.innerText = i + 1;
            btn.onclick = () => renderQuestion(i);
            grid.appendChild(btn);
        });
        updateGrid();
    }

    function updateGrid() {
        document.querySelectorAll('.q-dot').forEach((el, i) => {
            el.classList.toggle('answered', !!answers[i]);
            el.classList.toggle('current', i === currentIndex);
        });
    }

    function updateProgress() {
        const answered = Object.keys(answers).length;
        document.getElementById('answered-count').innerText = answered;
        const pct = (answered / questions.length) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
    }

    // ============================================================
    //  TIMER
    // ============================================================
    function startTimer() {
        renderTimer();
        timerInterval = setInterval(() => {
            secondsLeft--;
            renderTimer();
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                autoSubmit('Time is up!');
            }
        }, 1000);
    }

    function renderTimer() {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        const display = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        const el = document.getElementById('timer-display');
        el.innerText = display;
        el.className = 'timer-box';
        if (secondsLeft <= 300) el.classList.add('danger');
        else if (secondsLeft <= 600) el.classList.add('warn');
    }

    // ============================================================
    //  ANTI-MALPRACTICE
    // ============================================================
    function requestFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    }

    function setupAntiMalpractice() {
        // Tab / window switch
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !examSubmitted) addStrike('Tab switch detected');
        });

        // Fullscreen exit
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !examSubmitted) addStrike('Fullscreen exited');
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement && !examSubmitted) addStrike('Fullscreen exited');
        });
    }

    function addStrike(reason) {
        strikes++;
        document.getElementById('strikes-count').innerText = strikes;
        if (strikes >= 3) {
            autoSubmit(`3 strikes reached (${reason}). Exam auto-submitted.`);
        } else {
            alert(`⚠️ STRIKE ${strikes}/3: ${reason}. ${3 - strikes} strike(s) remaining before auto-submit.`);
        }
    }

    // ============================================================
    //  SUBMIT
    // ============================================================
    function confirmSubmit() {
        const unanswered = questions.length - Object.keys(answers).length;
        const msg = unanswered > 0
            ? `You have ${unanswered} unanswered question(s). Are you sure you want to submit?`
            : 'All questions answered. Submit your exam?';
        if (confirm(msg)) submitExam();
    }

    function autoSubmit(reason) {
        if (examSubmitted) return;
        alert(reason + ' Submitting your exam now...');
        submitExam();
    }

    async function submitExam() {
        if (examSubmitted) return;
        examSubmitted = true;
        clearInterval(timerInterval);

        document.getElementById('submit-exam-btn').disabled = true;
        document.getElementById('submit-exam-btn').innerText = 'Submitting...';

        // Exit fullscreen
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});

        // Calculate scores per subject
        const scores = {
            english_score:    0,
            math_score:       0,
            physics_score:    0,
            chemistry_score:  0,
            gns_score:        0,
            economics_score:  0,
            literature_score: 0,
            government_score: 0,
            commerce_score:   0,
        };

        const subjectMap = {
            english:    'english_score',
            math:       'math_score',
            physics:    'physics_score',
            chemistry:  'chemistry_score',
            gns:        'gns_score',
            economics:  'economics_score',
            literature: 'literature_score',
            government: 'government_score',
            commerce:   'commerce_score',
        };

        let totalScore = 0;

        questions.forEach((q, i) => {
            if (answers[i] && answers[i] === q.correct_answer) {
                const key = subjectMap[q.subject];
                if (key) {
                    scores[key]++;
                    totalScore++;
                }
            }
        });

        const payload = {
            student_id:   currentUserId,
            total_score:  totalScore,
            submitted_at: new Date().toISOString(),
            ...scores,
        };

        const { error } = await supabaseClient.from('results').insert(payload);

        if (error) {
            console.error('Submit error:', error);
            alert('Failed to save results. Your score was ' + totalScore + '/50. Please contact admin.');
        }

        window.location.href = '../view-results/index.html';
    }
</script>

</body>
</html>
