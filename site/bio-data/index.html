<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile — AFIT CBT Simulator</title>
    <link rel="icon" type="image/svg+xml" href="../static/img/afitcbtsim-logo.svg">
    <link rel="icon" type="image/png" sizes="512x512" href="../static/img/afitcbtsim-logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../static/img/afitcbtsim-logo1.png">
    <link rel="apple-touch-icon" href="../static/img/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/main.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1d4ed8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; font-family: 'Poppins', sans-serif; }
        .card { background: white; border-radius: 24px; padding: 2.5rem 2rem; width: 100%; max-width: 680px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); }
        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-header .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1.2rem; font-weight: 800; font-size: 1.1rem; color: #0f172a; }
        .card-header h2 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.3rem; }
        .card-header p { color: #64748b; font-size: 0.9rem; }
        .steps-bar { display: flex; gap: 6px; margin-bottom: 2rem; }
        .step-dot { height: 4px; border-radius: 4px; background: #e2e8f0; flex: 1; transition: background 0.3s; }
        .step-dot.active { background: #2563eb; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .span-2 { grid-column: 1 / -1; }
        .bio-message { font-size: 0.875rem; font-weight: 600; padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1rem; display: none; }
        .bio-message.error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .bio-message.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .span-2 { grid-column: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" rx="22" fill="url(#bio-grad)"/>
                    <path d="M50 20 L22 75 H36 L43 60 H57 L64 75 H78 L50 20 Z" fill="#ffffff"/>
                    <defs><linearGradient id="bio-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient></defs>
                </svg>
                AFIT CBT SIM
            </div>
            <h2>Complete Your Profile</h2>
            <p>This information personalises your exam and is required before you can start.</p>
        </div>

        <div class="steps-bar">
            <div class="step-dot active"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <div id="bio-message" class="bio-message"></div>

        <form id="bio-form" onsubmit="submitBioData(event)">
            <div class="form-grid">

                <div class="input-group span-2">
                    <label for="full_name">Full Legal Name <span style="color:#ef4444">*</span></label>
                    <input type="text" id="full_name" placeholder="e.g. Adebayo Chukwuemeka John" required>
                </div>

                <div class="input-group">
                    <label for="phone_number">Phone Number <span style="color:#ef4444">*</span></label>
                    <input type="tel" id="phone_number" placeholder="e.g. 08012345678" required>
                </div>

                <div class="input-group">
                    <label for="jamb_score">JAMB Score <span style="color:#ef4444">*</span></label>
                    <input type="number" id="jamb_score" placeholder="e.g. 240" min="0" max="400" required>
                </div>

                <div class="input-group">
                    <label for="program_type">Program Type <span style="color:#ef4444">*</span></label>
                    <select id="program_type" required>
                        <option value="" disabled selected>Select programme</option>
                        <option value="UTME">UTME (Undergraduate)</option>
                        <option value="DE">Direct Entry (DE)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="state_of_origin">State of Origin <span style="color:#ef4444">*</span></label>
                    <select id="state_of_origin" required>
                        <option value="" disabled selected>Select state</option>
                        <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option>
                        <option>Anambra</option><option>Bauchi</option><option>Bayelsa</option>
                        <option>Benue</option><option>Borno</option><option>Cross River</option>
                        <option>Delta</option><option>Ebonyi</option><option>Edo</option>
                        <option>Ekiti</option><option>Enugu</option><option>FCT (Abuja)</option>
                        <option>Gombe</option><option>Imo</option><option>Jigawa</option>
                        <option>Kaduna</option><option>Kano</option><option>Katsina</option>
                        <option>Kebbi</option><option>Kogi</option><option>Kwara</option>
                        <option>Lagos</option><option>Nasarawa</option><option>Niger</option>
                        <option>Ogun</option><option>Ondo</option><option>Osun</option>
                        <option>Oyo</option><option>Plateau</option><option>Rivers</option>
                        <option>Sokoto</option><option>Taraba</option><option>Yobe</option>
                        <option>Zamfara</option>
                    </select>
                </div>

                <div class="input-group span-2">
                    <label for="course_applied">Course Applied For <span style="color:#ef4444">*</span></label>
                    <select id="course_applied" required>
                        <option value="" disabled selected>Select your course</option>
                        <optgroup label="Engineering">
                            <option>Aerospace Engineering [ENG]</option>
                            <option>Civil Engineering [ENG]</option>
                            <option>Computer Engineering [ENG]</option>
                            <option>Electrical/Electronic Engineering [ENG]</option>
                            <option>Mechanical Engineering [ENG]</option>
                        </optgroup>
                        <optgroup label="Science">
                            <option>Computer Science [SCI]</option>
                            <option>Mathematics [SCI]</option>
                            <option>Physics [SCI]</option>
                            <option>Chemistry [SCI]</option>
                            <option>Biochemistry [SCI]</option>
                            <option>Microbiology [SCI]</option>
                        </optgroup>
                        <optgroup label="Social Sciences">
                            <option>Accounting [SS]</option>
                            <option>Business Administration [SS]</option>
                            <option>Economics [SS]</option>
                            <option>Public Administration [SS]</option>
                        </optgroup>
                        <optgroup label="Arts & Humanities">
                            <option>English and Literature [ART]</option>
                            <option>History and War Studies [ART]</option>
                            <option>International Relations [ART]</option>
                            <option>Political Science [ART]</option>
                        </optgroup>
                        <optgroup label="Information Technology">
                            <option>Information Technology [IT]</option>
                            <option>Cyber Security [IT]</option>
                        </optgroup>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn-submit" id="submit-btn" style="margin-top: 1rem;">
                Save & Continue to Dashboard →
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/app.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = '../login/index.html';

            // If already has a profile, skip to dashboard
            const { data: profile } = await supabaseClient.from('profiles').select('full_name').eq('id', session.user.id).single();
            if (profile && profile.full_name) {
                window.location.href = '../dashboard/index.html';
            }
        });

        async function submitBioData(event) {
            event.preventDefault();

            const btn = document.getElementById('submit-btn');
            const msgEl = document.getElementById('bio-message');

            btn.innerText = 'Saving...';
            btn.disabled = true;
            msgEl.className = 'bio-message';
            msgEl.innerText = '';

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = '../login/index.html';

            const payload = {
                full_name:       document.getElementById('full_name').value.trim(),
                phone_number:    document.getElementById('phone_number').value.trim(),
                jamb_score:      parseInt(document.getElementById('jamb_score').value),
                program_type:    document.getElementById('program_type').value,
                state_of_origin: document.getElementById('state_of_origin').value,
                course_applied:  document.getElementById('course_applied').value,
            };

            const { error } = await supabaseClient
                .from('profiles')
                .update(payload)
                .eq('id', session.user.id);

            if (error) {
                msgEl.innerText = 'Failed to save: ' + error.message;
                msgEl.className = 'bio-message error';
                btn.innerText = 'Save & Continue to Dashboard →';
                btn.disabled = false;
            } else {
                msgEl.innerText = 'Profile saved! Redirecting to dashboard...';
                msgEl.className = 'bio-message success';
                setTimeout(() => {
                    window.location.href = '../dashboard/index.html';
                }, 1200);
            }
        }
    </script>

</body>
</html>
